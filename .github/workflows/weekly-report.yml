name: Weekly report

on:
  schedule:
    # 台北每週五 15:00（台股收盤後、當日價格更新後）
    - cron: '0 7 * * 5'
  workflow_dispatch: {}   # 允許手動觸發測試

permissions:
  contents: read

jobs:
  report:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Generate & send weekly report
        env:
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
        run: node scripts/weekly-report.mjs
